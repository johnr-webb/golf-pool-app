# Firebase App Hosting runtime config.
# See https://firebase.google.com/docs/app-hosting/configure
#
# NEXT_PUBLIC_* env vars are inlined into the client bundle at build time.
# NEXT_PUBLIC_FIREBASE_API_KEY and NEXT_PUBLIC_FIREBASE_APP_ID are stored as
# Secret Manager secrets for hygiene, even though they ship in the client bundle.
# Create secrets with: firebase apphosting:secrets:set <secretName>

runConfig:
  maxInstances: 2
  minInstances: 0
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: NEXT_PUBLIC_API_BASE_URL
    value: https://us-central1-golf-pool-app-492300.cloudfunctions.net/api
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: firebase-web-api-key
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: golf-pool-app-492300.firebaseapp.com
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: golf-pool-app-492300
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: firebase-web-app-id
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_USE_EMULATORS
    value: "false"
    availability: [BUILD, RUNTIME]
